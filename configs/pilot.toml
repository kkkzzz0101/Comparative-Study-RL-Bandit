[experiment]
name = "pilot"
horizon = 10000
seed_start = 0
n_seeds = 10
output_dir = "results/pilot"
save_trajectories = true

[[algorithms]]
name = "random"

# Enable each policy only after its implementation and unit tests are complete.
[[algorithms]]
name = "ucb1"
enabled = false

[[algorithms]]
name = "thompson_sampling"
enabled = false

[[algorithms]]
name = "discounted_ucb"
enabled = false
[algorithms.params]
discount = 0.99

[[algorithms]]
name = "sliding_window_ucb"
enabled = false
[algorithms.params]
window_size = 250

[[algorithms]]
name = "exp3"
enabled = false
[algorithms.params]
gamma = 0.07

[[environments]]
name = "stationary"
[environments.params]
n_arms = 10

[[environments]]
name = "gradual_drift"
[environments.params]
n_arms = 10
cycles = 1.5
amplitude = 0.3

[[environments]]
name = "abrupt_change"
[environments.params]
n_arms = 10
n_changes = 3

[[environments]]
name = "oblivious_adversarial"
[environments.params]
n_arms = 10
block_size = 50
corruption = 0.1
