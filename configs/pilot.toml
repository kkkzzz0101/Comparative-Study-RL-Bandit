[experiment]
name = "pilot"
horizon = 10000
seed_start = 0
n_seeds = 10
output_dir = "results/pilot"
save_trajectories = true

[[algorithms]]
name = "random"

# Enable each policy only after its implementation and unit tests are complete.
[[algorithms]]
name = "ucb1"
enabled = false

[[algorithms]]
name = "thompson_sampling"
enabled = false

[[algorithms]]
name = "discounted_ucb"
enabled = false
[algorithms.params]
discount = 0.99

[[algorithms]]
name = "sliding_window_ucb"
enabled = false
[algorithms.params]
window_size = 250

[[algorithms]]
name = "exp3"
enabled = false
[algorithms.params]
gamma = 0.07

[[environments]]
name = "stationary"
[environments.params]
n_arms = 10
gap = 0.10

[[environments]]
name = "canonical_abrupt"
[environments.params]
n_arms = 3

[[environments]]
name = "random_abrupt"
[environments.params]
n_arms = 10
n_changes = 5
min_segment_length = 1000
arm_change_probability = 0.5
min_jump = 0.05
max_jump = 0.30

[[environments]]
name = "gradual_drift"
[environments.params]
n_arms = 10
cycles = 1.5
amplitude = 0.3

[[environments]]
name = "bounded_random_walk"
[environments.params]
n_arms = 10
step_std = 0.03

[[environments]]
name = "hazard_switching"
id = "hazard_global"
[environments.params]
n_arms = 10
hazard_rate = 0.001
mode = "global"

[[environments]]
name = "hazard_switching"
id = "hazard_per_arm"
[environments.params]
n_arms = 10
hazard_rate = 0.001
mode = "per_arm"

[[environments]]
name = "rapid_switching"
[environments.params]
n_arms = 10
block_size = 50
corruption = 0.1
