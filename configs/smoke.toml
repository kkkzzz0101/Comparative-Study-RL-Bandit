[experiment]
name = "smoke"
horizon = 200
seeds = [0, 1]
output_dir = "results/smoke"
save_trajectories = true

[[algorithms]]
name = "random"

[[environments]]
name = "stationary"
[environments.params]
n_arms = 5
gap = 0.10

[[environments]]
name = "canonical_abrupt"
[environments.params]
n_arms = 3

[[environments]]
name = "random_abrupt"
[environments.params]
n_arms = 5
n_changes = 3
min_segment_length = 30

[[environments]]
name = "gradual_drift"
[environments.params]
n_arms = 5
cycles = 1.0
amplitude = 0.30

[[environments]]
name = "bounded_random_walk"
[environments.params]
n_arms = 5
step_std = 0.03

[[environments]]
name = "hazard_switching"
id = "hazard_global"
[environments.params]
n_arms = 5
hazard_rate = 0.05
mode = "global"

[[environments]]
name = "hazard_switching"
id = "hazard_per_arm"
[environments.params]
n_arms = 5
hazard_rate = 0.05
mode = "per_arm"

[[environments]]
name = "rapid_switching"
[environments.params]
n_arms = 5
block_size = 25
corruption = 0.10
